<script>
    (function() {
      var STORAGE_KEY = 'theme';
      var btn = document.getElementById('theme-toggle');
      var label = document.getElementById('theme-toggle-label');

      function getStored() { try { return localStorage.getItem(STORAGE_KEY); } catch(e) { return null; } }
      function setStored(v) { try { localStorage.setItem(STORAGE_KEY, v); } catch(e) {} }

      function getSystem() {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (label) label.textContent = theme === 'light' ? '●○' : '○●';
      }

      var stored = getStored();
      applyTheme(stored || getSystem());

      if (btn) {
        btn.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme') || getSystem();
          var next = current === 'dark' ? 'light' : 'dark';
          setStored(next);
          applyTheme(next);
        });
      }

      
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
          if (!getStored()) applyTheme(e.matches ? 'light' : 'dark');
        });
      }
    })();
  </script>
